<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1180 610" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Tabek — developer profile</title>
  <desc id="desc">An animated terminal-inspired developer profile hero banner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#f1f5f9"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffffff" stop-opacity=".92"/><stop offset="1" stop-color="#0f172a" stop-opacity=".84"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2563eb"><animate attributeName="stop-color" values="#2563eb;#06b6d4;#10b981;#2563eb" dur="12s" repeatCount="indefinite"/></stop><stop offset=".52" stop-color="#06b6d4"><animate attributeName="stop-color" values="#06b6d4;#10b981;#2563eb;#06b6d4" dur="12s" repeatCount="indefinite"/></stop><stop offset="1" stop-color="#10b981"><animate attributeName="stop-color" values="#10b981;#2563eb;#06b6d4;#10b981" dur="12s" repeatCount="indefinite"/></stop><animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="14s" repeatCount="indefinite"/></linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#06b6d4" stop-opacity="0"/><stop offset=".42" stop-color="#e0f2fe" stop-opacity=".8"/><stop offset=".58" stop-color="#a78bfa" stop-opacity=".8"/><stop offset="1" stop-color="#06b6d4" stop-opacity="0"/></linearGradient>
    <radialGradient id="violet"><stop stop-color="#2563eb" stop-opacity=".05"/><stop offset="1" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <radialGradient id="cyan"><stop stop-color="#06b6d4" stop-opacity=".08"/><stop offset="1" stop-color="#06b6d4" stop-opacity="0"/></radialGradient>
    <radialGradient id="green"><stop stop-color="#10b981" stop-opacity=".06"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feGaussianBlur in="SourceAlpha" stdDeviation="13" result="s"/><feOffset in="s" dy="10"/><feComponentTransfer><feFuncA type="linear" slope=".55"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
