      <g transform="translate(42 106)"><text fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" opacity="0">Hi 👋<animate attributeName="opacity" values="0;1" begin=".4s" dur=".45s" fill="freeze"/></text><text y="61" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="47" font-weight="700" letter-spacing="-2.2" opacity="0">I'm Tabek<animate attributeName="opacity" values="0;1" begin=".8s" dur=".5s" fill="freeze"/></text>
        <text y="101" fill="#64748b" font-family="ui-monospace,monospace" font-size="13">$</text><g transform="translate(19 89)" fill="url(#accent)" font-family="ui-monospace,monospace" font-size="14" filter="url(#glow)"><text y="12" mask="url(#type1)">Frontend Engineer</text><text y="12" mask="url(#type2)">Full Stack Developer</text><text y="12" mask="url(#type3)">Open Source Contributor</text><text y="12" mask="url(#type4)">UI Engineer</text><text y="12" mask="url(#type5)">AI Enthusiast</text><rect x="188" y="0" width="7" height="16" rx="1" fill="#06b6d4"><animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/></rect></g>
        <g transform="translate(0 146)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12"><path d="M0 0H572" stroke="#0f172a" stroke-opacity=".08"/><g opacity="0"><animate attributeName="opacity" values="0;1" begin="1.25s" dur=".35s" fill="freeze"/><text x="0" y="28" fill="#64748b" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1.2">LOCATION</text><text x="0" y="48" fill="#334155">Tomsk</text><text x="180" y="28" fill="#64748b" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1.2">EDUCATION</text><text x="180" y="48" fill="#334155">Tusur State University</text></g><g opacity="0"><animate attributeName="opacity" values="0;1" begin="1.65s" dur=".35s" fill="freeze"/><text x="0" y="82" fill="#64748b" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1.2">CURRENT FOCUS</text><text x="0" y="102" fill="#334155">Product interfaces</text><text x="180" y="82" fill="#64748b" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1.2">PORTFOLIO</text><text x="180" y="102" fill="#334155">github.com/tab11pm</text></g><g opacity="0"><animate attributeName="opacity" values="0;1" begin="2.05s" dur=".35s" fill="freeze"/><text x="0" y="136" fill="#64748b" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1.2">EMAIL</text><text x="0" y="156" fill="#334155">tabrez.frontend@gmail.com</text></g></g>
        <g transform="translate(0 310)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11"><text fill="#64748b" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1.2">STACK / TOOLKIT</text><g transform="translate(0 16)" fill="#0f172a" stroke="#06b6d4" stroke-opacity=".26"><g><rect width="77" height="27" rx="13.5" fill="#ffffff"/><text x="14" y="18">TypeScript</text></g><g transform="translate(86)"><rect width="55" height="27" rx="13.5" fill="#ffffff"/><text x="15" y="18">React</text></g><g transform="translate(150)"><rect width="86" height="27" rx="13.5" fill="#ffffff"/><text x="13" y="18">PostgreSQL</text></g><g transform="translate(245)"><rect width="63" height="27" rx="13.5" fill="#ffffff"/><text x="15" y="18">Docker</text></g><g transform="translate(317)"><rect width="63" height="27" rx="13.5" fill="#ffffff"/><text x="16" y="18">Golang</text></g><g transform="translate(389)"><rect width="42" height="27" rx="13.5" fill="#ffffff"/><text x="14" y="18">Gin</text></g><g transform="translate(440)"><rect width="58" height="27" rx="13.5" fill="#ffffff"/><text x="14" y="18">Nest.js</text></g><animateTransform attributeName="transform" additive="sum" type="scale" values="1;1.018;1" dur="3s" repeatCount="indefinite"/></g></g>
