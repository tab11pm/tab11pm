name: Update profile statistics

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m unittest tests.test_update_profile -v
      - run: python scripts/update_profile.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_LOGIN: tab11pm
      - run: |
          git diff --quiet -- dark.svg light.svg || {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add dark.svg light.svg
            git commit -m 'chore: update profile statistics'
            git push
          }
